    /* Source Sans 3 — lokal eingebettet (offline-fähig, kein externer Font-Request) */
    @font-face {

  <style>
    /* ============================================================
       Design-Tokens — Light (Default) / Dark via [data-theme]
       ============================================================ */
    :root {
      color-scheme: light;
      --bg:        #ffffff;
      --bg2:       #f7f8fa;
      --bg3:       #eef0f4;
      --bg-hover:  #e4e7ee;
      --surface:   #ffffff;

      --text:      #1a1a1a;
      --heading:   #0a0a0a;
      --text2:     #5c6577;
      --border:    #dfe3ea;
      --border2:   #c8cedb;

      --accent:    #18181b;
      --accent-sub:#eef0f4;

      --hard:      #d33a3a;
      --hard-bg:   #fdeaea;
      --hard-tx:   #a92222;

      --soft:      #d18b00;
      --soft-bg:   #fdf1dd;
      --soft-tx:   #8a5a00;

      --good:      #1f8a52;
      --good-bg:   #e6f6ed;
      --good-tx:   #14663c;

      --shadow:    0 1px 2px rgba(16,24,40,0.05), 0 4px 14px rgba(16,24,40,0.06);
      --shadow-sm: 0 1px 2px rgba(16,24,40,0.06);

      --radius:    12px;
      --radius-sm: 8px;

      --font: 'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg:        #0d1117;
      --bg2:       #151b23;
      --bg3:       #1c2330;
      --bg-hover:  #253040;
      --surface:   #151b23;

      --text:      #dcdfe4;
      --heading:   #f5f7fa;
      --text2:     #97a3b6;
      --border:    #262f3d;
      --border2:   #364154;

      --accent:    #e8edf5;
      --accent-sub:#1c2330;

      --hard:      #f2685f;
      --hard-bg:   #3a1c1c;
      --hard-tx:   #ff9a92;

      --soft:      #e0a53a;
      --soft-bg:   #3a2c12;
      --soft-tx:   #f5c46a;

      --good:      #4cc38a;
      --good-bg:   #14311f;
      --good-tx:   #7ee0ab;

      --shadow:    0 1px 2px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.35);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 18px;
      line-height: 1.65;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    /* ---------- Header ---------- */
    header {
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      max-width: 880px;
      margin: 0 auto;
      padding: 0.85rem 1rem;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      text-decoration: none;
      color: inherit;
      min-width: 0;
      border-radius: var(--radius-sm);
    }

    .brand-mark {
      flex: none;
      width: 52px;
      height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2.15rem;
      line-height: 1;
      color: var(--bg);
      background: var(--text);
      border-radius: 11px;
      box-shadow: var(--shadow-sm);
      line-height: 0;
    }

    .brand-text { display: flex; flex-direction: column; min-width: 0; gap: 1px; }

    .brand-name {
      font-size: clamp(1.02rem, 3.4vw, 1.32rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--heading);
      text-wrap: balance;
    }

    .brand-tagline {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text2);
      line-height: 1.3;
    }

    @media (max-width: 420px) {
      .brand-tagline { display: none; }
      .brand-mark { width: 42px; height: 42px; font-size: 1.45rem; }
    }

    .theme-toggle {
      flex: none;
      width: 40px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      line-height: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .theme-toggle:hover { background: var(--bg3); border-color: var(--border2); }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 4px;
    }

    .container {
      max-width: 880px;
      margin: 0 auto;
      padding: 1.8rem 1rem 4rem;
    }

    /* ---------- Suche ---------- */
    .search-wrap {
      position: relative;
      margin-bottom: 1.6rem;
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 0.6rem 0;
      background: var(--bg);
    }

    .search-wrap input {
      width: 100%;
      min-height: 52px;
      padding: 0.85rem 1rem 0.85rem 2.9rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }

    .search-wrap input:focus {
      border-color: var(--accent);
      background: var(--surface);
      box-shadow: 0 0 0 3px var(--accent-sub);
    }

    .search-wrap input::placeholder { color: var(--text2); }

    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      display: inline-flex;
      color: var(--text);
      pointer-events: none;
      opacity: 0.7;
    }

    .suggestions {
      position: absolute;
      top: calc(100% - 0.4rem);
      left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow);
      max-height: 300px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }

    .suggestions.open { display: block; }

    .suggestion-item {
      min-height: 46px;
      padding: 0.65rem 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.95rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }

    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover, .suggestion-item.active { background: var(--bg3); }

    .sug-type {
      font-size: 0.78rem;
      color: var(--text2);
      margin-left: auto;
      white-space: nowrap;
    }

    /* ---------- Ergebnis-Karte ---------- */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: none;
    }

    .result-card.visible { display: block; }

    .card-header {
      background: var(--bg2);
      padding: 1.1rem 1.3rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.9rem;
      flex-wrap: wrap;
    }

    .unit-icon { font-size: 2.1rem; line-height: 1; }

    .unit-name {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--heading);
    }

    .unit-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.35rem;
    }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .badge-type { background: var(--accent-sub); color: var(--accent); border: 1px solid transparent; }
    .badge-civ  { background: var(--good-bg); color: var(--good-tx); border: 1px solid transparent; }
    .badge-uu   { background: var(--soft-bg); color: var(--soft-tx); border: 1px solid transparent; }

    /* UU-Symbol an Kontereinheiten */
    .uu-tag {
      display: inline-block;
      margin-left: 0.4rem;
      padding: 0.05rem 0.32rem;
      border-radius: 4px;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      vertical-align: middle;
      background: var(--soft-bg);
      color: var(--soft-tx);
    }

    /* Kurzprofil (ein Satz) */
    .unit-blurb {
      font-size: 0.92rem;
      line-height: 1.45;
      color: var(--text);
      margin-bottom: 1.2rem;
    }

    /* Civ-Bonus mit Original-Wappen */
    .civ-bonus-box {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.7rem 0.85rem;
      background: var(--accent-sub);
      border-radius: 8px;
    }
    .civ-emblem {
      flex: 0 0 auto;
      border-radius: 6px;
      object-fit: contain;
    }
    .civ-bonus-box .civ-bonus-list {
      flex: 1;
      padding: 0;
      background: none;
    }

    /* Civ-Bonus-Liste */
    .civ-bonus-list {
      list-style: none;
      margin: 0;
      padding: 0.7rem 0.85rem;
      font-size: 0.88rem;
      line-height: 1.4;
      color: var(--text);
      background: var(--accent-sub);
      border-radius: 8px;
    }

    /* Unique Technologies */
    .ut-grid { display: grid; gap: 0.5rem; }
    .ut-row {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 0.6rem 0.8rem;
      padding: 0.6rem 0.85rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .ut-icon { flex: 0 0 auto; border-radius: 6px; object-fit: contain; }
    .ut-icon-ph {
      display: flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; font-size: 1.1rem;
      background: var(--accent-sub); border-radius: 6px;
    }
    /* Civ-Verstärkungen für generische Einheiten (zugeklappt) */
    .civ-boosts summary {
      cursor: pointer;
      padding: 0.6rem 0.85rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      color: var(--text2);
      list-style: none;
    }
    .civ-boosts summary::-webkit-details-marker { display: none; }
    .civ-boosts summary::before { content: "▸ "; color: var(--accent); font-weight: 700; }
    .civ-boosts[open] summary::before { content: "▾ "; }
    .civ-boosts summary:hover { background: var(--bg-hover); }
    .civ-boost-list { display: grid; gap: 0.45rem; margin-top: 0.45rem; }
    .civ-boost {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: start;
      gap: 0.7rem;
      padding: 0.6rem 0.85rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .civ-boost-name { font-weight: 700; font-size: 0.9rem; color: var(--text); margin-bottom: 0.15rem; }
    .civ-boost-lines { list-style: none; margin: 0; padding: 0; font-size: 0.85rem; color: var(--text2); line-height: 1.45; }
    .civ-boost-lines li + li { margin-top: 0.2rem; }
    .civ-boost-lines b { color: var(--text); font-weight: 600; }

    .ut-name { font-weight: 600; font-size: 0.95rem; color: var(--text); line-height: 1.35; }
    .ut-desc { font-size: 0.85rem; color: var(--text2); margin-top: 0.2rem; line-height: 1.45; }
    .civ-bonus-list li { position: relative; }
    .civ-bonus-list li + li { margin-top: 0.4rem; }

    .card-body { padding: 1.3rem; }

    .section-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.55rem;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ---------- Konter-Zeilen ---------- */
    .counter-grid {
      display: grid;
      gap: 0.5rem;
    }

    .counter-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: start;
      gap: 0.6rem 0.8rem;
      min-height: 46px;
      padding: 0.75rem 0.9rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      border-left: 4px solid var(--border2);
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }

    .counter-row:hover { background: var(--bg-hover); }

    .counter-row.hard { border-left-color: var(--hard); }
    .counter-row.soft { border-left-color: var(--soft); }

    .counter-icon { font-size: 1.1rem; line-height: 1.4; }

    .counter-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
      line-height: 1.4;
    }

    .counter-reason {
      font-size: 0.85rem;
      color: var(--text2);
      margin-top: 0.2rem;
      line-height: 1.45;
    }

    .strength-badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      white-space: nowrap;
      align-self: start;
      margin-top: 0.15rem;
    }

    .strength-badge.hard { background: var(--hard-bg); color: var(--hard-tx); }
    .strength-badge.soft { background: var(--soft-bg); color: var(--soft-tx); }
    .strength-badge.strong { background: var(--good-bg); color: var(--good-tx); }
    .counter-row.strong { border-left-color: var(--good); }

    .section-title.mt { margin-top: 1.2rem; }

    /* ---------- Werte/Kosten als Zeilen-Liste ---------- */
    .data-grid { display: grid; gap: 0.45rem; margin-bottom: 1rem; }
    .data-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 0.7rem;
      padding: 0.6rem 0.85rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .data-icon { font-size: 1.1rem; width: 1.4rem; text-align: center; line-height: 1; display: flex; align-items: center; justify-content: center; }
    .stat-icon { width: 20px; height: 20px; object-fit: contain; display: block; }
    .data-label {
      font-size: 0.9rem; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500;
    }
    .data-val {
      font-size: 1.05rem; font-weight: 700; letter-spacing: -0.01em;
      color: var(--text); font-variant-numeric: tabular-nums;
    }
    .data-val .sub { font-size: 0.72rem; color: var(--text2); font-weight: 400; margin-left: 0.15rem; }
    .data-bonus {
      background: var(--good-bg); color: var(--good-tx);
      padding: 0.05rem 0.45rem; border-radius: 999px; font-size: 0.9rem;
    }

    /* ---------- Bonus-Chips ---------- */
    .bonus-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.5rem;
    }

    .bonus-chip {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .bonus-val {
      background: var(--good-bg);
      color: var(--good-tx);
      font-weight: 700;
      padding: 0.05rem 0.4rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-variant-numeric: tabular-nums;
    }

    .bonus-note {
      margin-top: 0.6rem;
      font-size: 0.78rem;
      color: var(--text2);
    }

    .strong-vs-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: 0.5rem;
      align-items: center;
    }

    .strong-vs-label {
      font-size: 0.72rem;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-right: 0.15rem;
    }

    .cluster-chip {
      background: var(--good-bg);
      border: 1px solid transparent;
      color: var(--good-tx);
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    /* ---------- Civ-Boni ---------- */
    .civ-bonus-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.5rem;
      margin-bottom: 1.2rem;
    }

    .civ-chip {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.3rem 0.65rem;
      border-radius: var(--radius-sm);
      font-size: 0.82rem;
      line-height: 1.4;
    }

    .civ-chip b { color: var(--accent); font-weight: 600; }

    /* ---------- Kompakte Kampfwerte ---------- */
    .counter-stats {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.25rem 0.4rem;
      margin-top: 0.4rem;
      font-size: 0.8rem;
      color: var(--text2);
      font-variant-numeric: tabular-nums;
    }

    .counter-stats .cs-sep { color: var(--border2); }
    .counter-stats .cs-bonus { color: var(--good); white-space: nowrap; }

    /* ---------- Stat-Kacheln ---------- */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 0.5rem;
      margin-bottom: 1.3rem;
    }

    .stat {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.6rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .stat-label {
      font-size: 0.72rem;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.05em;

// Filter noise from bonus display (very small or niche bonuses)
function getDisplayableBonuses(unitName) {
  const list = BONUS_VS[unitName];
  if (!list) return [];
  return list
    .filter(b => {
      // Skip niche/very specific bonus classes that confuse more than inform
      if (b.c === 29 && b.a <= 3) return false;  // Leitis-specific, low amount
      if (b.c === 30 && b.a <= 3) return false;  // Hero, low amount
      if (b.c === 38) return false;              // Wildlife
      if (b.c === 23 && b.a <= 4) return false;  // Condottiero
      return true;
    })
    .sort((a,b) => b.a - a.a)  // Highest bonus first
    .slice(0, 6);              // Cap at 6 entries
}

// ── Typ-Icons ─────────────────────────────────────────────
function getTypeIcon(type) {
  const t = type.toLowerCase();
  if (t.includes("infanterie"))      return "🗡️";
  if (t.includes("bogenschütze"))    return "🏹";
  if (t.includes("kavallerie"))      return "🐴";
  if (t.includes("kamel"))          return "🐪";
  if (t.includes("kavallerieogen")) return "🎯";
  if (t.includes("belagerung"))     return "💣";
  if (t.includes("schiff"))         return "⛵";
  if (t.includes("support"))        return "✝️";
  if (t.includes("wirtschaft"))     return "⛏️";
  if (t.includes("schusswaffe"))    return "🔫";
  if (t.includes("spezial"))        return "👑";
  return "⚔️";
}

function getUnitIconHtml(name, type, size = 24) {
  const id = UNIT_ICON_MAP[name];
  if (id !== undefined && id !== null) {
    return `<img src="icons/${padIcon(id)}_50730.png" alt="${name}" style="width:${size}px;height:${size}px;image-rendering:auto;vertical-align:middle" onerror="this.replaceWith(document.createTextNode('${getTypeIcon(type)}'))">`;
  }
  return getTypeIcon(type);
}

function tx(category, deStr) {
  if (currentLang === 'de') return deStr;
  return (T_EN[category] && T_EN[category][deStr]) || deStr;
}

function displayName(enName) {
  if (currentLang === 'de') {
    const de = NAMES_DE[enName];
    return de ? `${de} <span style="color:var(--text2);font-weight:400;font-size:0.85em">· ${enName}</span>` : enName;
  }
  return enName;
}

const allUnits = Object.keys(UNITS).sort();

// ── Civ-Suche: Civ-Name (DE/EN) eintippen → Unique/regionale Units der Civ ──
// Trenner robust behandeln: civ-Felder nutzen "/", T_EN.civs-Keys teils "/" teils "\".
function splitCiv(civ) {
  return civ.split(/[\/\\]/).map(s => s.trim()).filter(Boolean);
}
// DE-Civ-Teil → EN-Civ-Teil (paarweises Zip aus T_EN.civs, separator-tolerant)
const CIV_PART_EN = {};
for (const deKey in T_EN.civs) {
  if (deKey === "Generic") continue;
  const deParts = splitCiv(deKey);
  const enParts = splitCiv(T_EN.civs[deKey]);
  deParts.forEach((dp, i) => { if (dp && !CIV_PART_EN[dp]) CIV_PART_EN[dp] = enParts[i] || dp; });
}
// DE-Civ-Teil → Liste der Unit-Namen
const CIV_UNITS = {};
for (const u of allUnits) {
  const civ = UNITS[u].civ;
  if (!civ || civ === "Generic") continue;
  for (const part of splitCiv(civ)) {
    if (!CIV_UNITS[part]) CIV_UNITS[part] = [];
    CIV_UNITS[part].push(u);
  }
}
// Units aller Civs, deren Name (DE oder EN) mit q beginnt
function getCivMatchedUnits(q) {
  const out = [];
  for (const dePart in CIV_UNITS) {
    const de = normalize(dePart);
    const en = normalize(CIV_PART_EN[dePart] || "");
    if (de.startsWith(q) || en.startsWith(q)) out.push(...CIV_UNITS[dePart]);
  }
  return out;
}

};
const CLUSTER_ORDER = Object.keys(CLUSTERS);

// Mapping BONUS_VS-Klasse -> Cluster (für Bonus-Schaden-basierte Ableitung)
// Beispiel: Samurai hat c:19 (+10/+12) → automatisch "stark gegen Unique Units"
const CLASS_TO_CLUSTERS = {
  1:  ["Champion Line", "Pike Line", "Eagle Line"],         // Infanterie
  5:  ["Battle Elephants", "Siege Elephants"],              // Kriegselefanten
  8:  ["Knight Line", "Light Cav"],                         // Kavallerie (ohne Kamele)
  15: ["Archer Line"],                                       // Bogenschützen-Klasse
  16: ["Mangonel/Onager", "Scorpion", "Rams", "Cannons"],   // Belagerung
  19: ["Unique Units"],                                      // Anti-UU (Samurai)
  20: ["Eagle Line"],                                        // Adlerkrieger
  21: ["Cav Archer Line"],                                   // Kavallerie-Bogenschützen
  25: ["Monks"],                                             // Mönche
  28: ["Camel Line"],                                        // Kamele
  35: ["Camel Line"],                                        // Spezial-Kav (oft Kamel-Mirror)
};

// Reverse-Map: Unit -> Set von Cluster-Namen, gegen die sie stark ist
const STRONG_VS_CLUSTERS = {};
function addStrongVs(unit, cluster) {
  if (!STRONG_VS_CLUSTERS[unit]) STRONG_VS_CLUSTERS[unit] = new Set();
  STRONG_VS_CLUSTERS[unit].add(cluster);
}

// (1) Inverse Counter-Beziehung: Wenn X in UNITS[Y].counters steht, ist X stark gegen Y
for (const [clusterName, members] of Object.entries(CLUSTERS)) {
  for (const member of members) {
    const data = UNITS[member];
    if (!data) continue;
    for (const c of data.counters) addStrongVs(c.unit, clusterName);
  }
}

// (2) BONUS_VS-Daten: signifikante Bonuse (>=2) → stark gegen alle Cluster der Klasse
const STRONG_VS_BONUS_MIN = 2;
for (const [unitName, bonuses] of Object.entries(BONUS_VS)) {
  for (const b of bonuses) {
    if (b.a < STRONG_VS_BONUS_MIN) continue;
    const clusters = CLASS_TO_CLUSTERS[b.c];
    if (!clusters) continue;
    for (const cluster of clusters) addStrongVs(unitName, cluster);
  }
}

const searchInput = document.getElementById("search");
const suggestionsEl = document.getElementById("suggestions");
const resultEl = document.getElementById("result");
const cardHeader = document.getElementById("card-header");
const cardBody = document.getElementById("card-body");

let activeIndex = -1;
let currentSuggestions = [];

function normalize(s) {
  return s.toLowerCase().trim();
}

function matchUnit(u, q) {
  const en = normalize(u);
  const de = normalize(NAMES_DE[u] || "");
  return { startsWith: en.startsWith(q) || de.startsWith(q),
           includes:   en.includes(q)   || de.includes(q) };
}

function getSuggestions(query) {
  if (!query) return [];
  const q = normalize(query);
  const prefix   = allUnits.filter(u => matchUnit(u, q).startsWith);
  const contains = allUnits.filter(u => !matchUnit(u, q).startsWith && matchUnit(u, q).includes);
  const civ      = getCivMatchedUnits(q);
  // Reihenfolge: Unit-Name-Prefix → Civ-Treffer → Unit-Name-Contains, dedupliziert
  const seen = new Set(), out = [];
  for (const u of [...prefix, ...civ, ...contains]) {
    if (seen.has(u)) continue;
    seen.add(u);
    out.push(u);
  }
  return out.slice(0, 10);
}

function renderSuggestions(list) {
  suggestionsEl.innerHTML = "";
  currentSuggestions = list;
  activeIndex = -1;
  if (list.length === 0) {
    suggestionsEl.classList.remove("open");
    return;
  }
  list.forEach((name, i) => {
    const item = document.createElement("div");
    item.className = "suggestion-item";
    const unit = UNITS[name];
    const icon = getUnitIconHtml(name, unit.type, 24);
    const display = displayName(name);
    const civLabel = unit.civ !== "Generic" ? tx('civs', unit.civ) : tx('types', unit.type).split("/")[0].trim();
    item.innerHTML = `
      <span class="suggestion-icon">${icon}</span>
      <span>${display}</span>
      <span class="sug-type">${civLabel}</span>
    `;
    item.addEventListener("click", () => selectUnit(name));
    suggestionsEl.appendChild(item);
  });
  suggestionsEl.classList.add("open");
}

function selectUnit(name) {
  searchInput.value = name;
  suggestionsEl.classList.remove("open");
  showResult(name);
}

// Einzigartige Einheit? (Typ-Feld ist deutschbasiert: "… / Einzigartig")
function isUnique(name) {
  const u = UNITS[name];
  return !!(u && typeof u.type === "string" && u.type.includes("Einzigartig"));
}
function unitDesc(name) {
  const d = UNIT_DESC[name];
  if (!d) return "";
  return d[currentLang] || d.en || "";
}
// UU-Symbol für Counter-Zeilen
function uuTag(name) {
  return isUnique(name)
    ? `<span class="uu-tag" title="${ui('uu_tag_title')}">${ui('uu_tag')}</span>`
    : "";
}

// Welche Bonus-Schlagworte betreffen den Einheitentyp?
// Nennt der Text die Einheit direkt beim Namen? (z. B. "Logistica: Cataphracts …")
// Fängt auch Pluralformen, da auf den Singular-Namen geprüft wird.
function mentionsUnitByName(hay, unitName) {
  if (!unitName) return false;
  const base = unitName.replace(/^Elite\s+/i, "").trim().toLowerCase();
  if (base.length <= 3) return false;
  // Regulärer Plural deckt sich über den Singular ab; -man/-men zusätzlich prüfen
  const forms = [base];
  if (/man$/.test(base)) forms.push(base.replace(/man$/, "men"));
  if (/men$/.test(base)) forms.push(base.replace(/men$/, "man"));
  return forms.some(f => hay.includes(f));
}

// Boni, deren Subjekt die Dorfbewohner sind ("Villagers affected by Infantry …"),
// gehören nicht auf die Karte einer Militäreinheit.
function skipEcoBonus(text, unit) {
  return /^\s*villagers?\b/i.test(text) && !/^Wirtschaft/.test((unit && unit.type) || "");
}

function civClassKeywords(type) {
  const kw = new Set();
  let cavArch = false;
  // "Anti-Kavallerie" / "Anti-Bogenschütze" beschreiben das ZIEL, nicht die eigene Klasse —
  // sonst bekäme z. B. der Kamayuk (Infanterie) fälschlich Kavallerie-Boni.
  const t = String(type || "").replace(/Anti-[A-Za-zÄÖÜäöüß]+/g, " ");
  if (/Kavallerie?bogen|Kavallerieogen/.test(t)) { cavArch = true; ["cavalry archer", "mounted"].forEach(k => kw.add(k)); }
  if (/Bogenschütze/.test(t) && !cavArch) { ["foot archer", "archery range", "skirmisher", "arbalest", "crossbow", "archer"].forEach(k => kw.add(k)); }
  if (/Infanterie/.test(t)) { ["infantry", "militia", "spearman", "pikeman", "halberdier", "barracks", "eagle"].forEach(k => kw.add(k)); }
  if (/Kavallerie/.test(t) && !cavArch) { ["cavalry", "mounted", "knight", "cavalier", "paladin", "stable", "scout", "lancer", "battle elephant"].forEach(k => kw.add(k)); }
  if (/Kamel/.test(t)) { ["camel", "cavalry", "mounted", "stable"].forEach(k => kw.add(k)); }
  if (/Belagerung/.test(t)) { ["siege", "ram", "mangonel", "onager", "scorpion", "trebuchet", "bombard"].forEach(k => kw.add(k)); }
  if (/Schiff/.test(t)) { ["ship", "warship", "galley", "navy", "dock", "fire ship", "galleon"].forEach(k => kw.add(k)); }
  if (/Schusswaffe/.test(t)) { ["gunpowder", "cannon", "hand cannoneer", "bombard", "conquistador", "janissary"].forEach(k => kw.add(k)); }
  // Reine Support-/Wirtschafts-/Spezialeinheiten (Anker, damit "Schiff / Support" o. Ä. nicht Mönchsboni zieht)
  if (/^Support/.test(t)) { ["monk", "monastery", "relic", "conversion", "convert", "faith", "redemption", "healing", "missionary", "warrior priest"].forEach(k => kw.add(k)); }
  if (/^Wirtschaft/.test(t)) { ["villager", "farmer", "lumberjack", "gold miner", "stone miner", "forager", "hunter", "shepherd", "builder", "trade", "market", "caravan"].forEach(k => kw.add(k)); }
  if (/^Spezial/.test(t)) { ["king"].forEach(k => kw.add(k)); }
  return { kw: [...kw], cavArch };
}

// Boni, die diese konkrete Einheit unterstützen (in aktueller Sprache)
function getCivBonuses(unit, unitName) {
  if (!unit || unit.civ === "Generic") return null;
  const civ = unit.civ.split(" / ")[0].replace(/\s*\(.*\)\s*$/, "").trim();
  const cb = CIV_BONUSES[civ];
  if (!cb) return null;
  const { kw, cavArch } = civClassKeywords(unit.type);
  const list = [];
  cb.en.forEach((en, i) => {
    if (skipEcoBonus(en, unit)) return;
    let b = en.toLowerCase();
    if (!cavArch) b = b.replace(/cavalry archers?/g, " ");
    if (kw.some(k => b.includes(k)) || mentionsUnitByName(b, unitName)) {
      list.push(currentLang === "de" ? (cb.de[i] || en) : en);
    }
  });
  return { civ, list };
}

// Civ-Name einer Einheit auf den CIV_META/CIV_BONUSES-Key normalisieren
function civKey(unit) {
  if (!unit || unit.civ === "Generic") return null;
  return unit.civ.split(" / ")[0].replace(/\s*\(.*\)\s*$/, "").trim();
}

// Original-Civ-Wappen der Einheit (aus dem Spiel), z. B. /icons/civs/celts.png
function civEmblemHtml(unit, size = 40) {
  const key = civKey(unit);
  const meta = key && CIV_META[key];
  if (!meta || !meta.emblem) return "";
  return `<img class="civ-emblem" src="icons/civs/${meta.emblem}" alt="${tx('civs', key)}" width="${size}" height="${size}" loading="lazy">`;
}

// Unique Technologies der Civ — nur die, die DIESE Einheit betreffen
// (gleiche Keyword-Logik wie bei den Civ-Boni; Original-Tech-Icons /icons/tech/{pic}.png)
function getUniqueTechs(unit, unitName) {
  const key = civKey(unit);
  const meta = key && CIV_META[key];
  if (!meta || !meta.ut || !meta.ut.length) return null;
  const { kw, cavArch } = civClassKeywords(unit.type);
  const list = [];
  meta.ut.forEach(t => {
    let hay = `${t.n} ${t.d}`.toLowerCase();
    if (!cavArch) hay = hay.replace(/cavalry archers?/g, " ");
    if (!kw.some(k => hay.includes(k)) && !mentionsUnitByName(hay, unitName)) return;
    list.push({
      name: currentLang === "de" ? (t.nd || t.n) : t.n,
      desc: currentLang === "de" ? (t.dd || t.d) : t.d,
      pic: t.p,
    });
  });
  return list.length ? { civ: key, list } : null;
}

// Generische Einheiten haben keine eigene Civ — hier stattdessen zeigen,
// WELCHE Civs diese Einheit verstärken (Boni + Unique Techs), z. B. Franken/Chivalry beim Ritter.
function getCrossCivBoosts(unit, unitName) {
  if (!unit || unit.civ !== "Generic") return null;
  const { kw, cavArch } = civClassKeywords(unit.type);
  const hit = (t) => {
    let s = t.toLowerCase();
    if (!cavArch) s = s.replace(/cavalry archers?/g, " ");
    return kw.some(k => s.includes(k)) || mentionsUnitByName(s, unitName);
  };
  const out = [];
  for (const civ of Object.keys(CIV_META)) {
    const meta = CIV_META[civ];
    const lines = [];
    const cb = CIV_BONUSES[civ];
    if (cb) cb.en.forEach((en, i) => {
      if (skipEcoBonus(en, unit)) return;
      if (hit(en)) lines.push({ ut: false, text: currentLang === "de" ? (cb.de[i] || en) : en });
    });
    (meta.ut || []).forEach(t => {
      if (hit(`${t.n} ${t.d}`)) lines.push({
        ut: true,
        name: currentLang === "de" ? (t.nd || t.n) : t.n,
        text: currentLang === "de" ? (t.dd || t.d) : t.d,
        pic: t.p,
      });
    });
    if (lines.length) out.push({ civ, emblem: meta.emblem, lines });
  }
  return out.length ? out : null;
}

let currentResultName = null;
function showResult(name) {
  const unit = UNITS[name];
  if (!unit) return;
  currentResultName = name;

  resultEl.classList.add("visible");

  const icon = getUnitIconHtml(name, unit.type, 56);

  // Header — Unique Unit, Typ, Civ
  const uu = isUnique(name);
  cardHeader.innerHTML = `
    <div class="unit-icon">${icon}</div>
    <div>
      <div class="unit-name">${displayName(name)}</div>
      <div class="unit-meta">
        ${uu ? `<span class="badge badge-uu">${ui('unique_badge')}</span>` : ""}
        ${!uu ? `<span class="badge badge-type">${tx('types', unit.type).split("/")[0].trim()}</span>` : ""}
        ${unit.civ !== "Generic" ? `<span class="badge badge-civ">${tx('civs', unit.civ)}</span>` : ""}
      </div>
    </div>
  `;

  // Body — counter-first Aufbau
  const hard = unit.counters.filter(c => c.strength === "hard");
  const soft = unit.counters.filter(c => c.strength === "soft");
  const s = STATS[name];

  // Counter-Zeile (mit UU-Symbol bei einzigartigen Kontereinheiten)
  const counterGrid = (list, strength) => {
    let h = `<div class="counter-grid">`;
    list.forEach(c => {
      h += `
        <div class="counter-row ${strength}" onclick="selectUnit('${c.unit.replace(/'/g, "\\'")}')">
          <span class="counter-icon">${getUnitIconHtml(c.unit, UNITS[c.unit]?.type || "", 28)}</span>
          <div>
            <div class="counter-name">${displayName(c.unit)}${uuTag(c.unit)}</div>
            <div class="counter-reason">${tx('reasons', c.reason)}</div>
          </div>
          <span class="strength-badge ${strength}">${ui(strength + '_badge')}</span>
        </div>`;
    });
    h += `</div>`;
    return h;
  };

  let html = "";

  // ── 1) Harte Konter ──
  if (hard.length > 0) {
    html += `<div class="section-title">${ui('hard_section')}</div>`;
    html += counterGrid(hard, "hard");
  }

  // ── 2) Weiche Konter ──
  if (soft.length > 0) {
    html += `<div class="section-title"${hard.length ? ` style="margin-top:1.2rem"` : ""}>${ui('soft_section')}</div>`;
    html += counterGrid(soft, "soft");
  }

  if (unit.counters.length === 0) {
    html += `<div class="no-data" style="padding:1rem">${ui('no_counters')}</div>`;
  }

  // ── 3) Stark gegen — als Icon-Zeilen (Repräsentant-Icon + Grund) ──
  const strongClusters = STRONG_VS_CLUSTERS[name];
  if (strongClusters && strongClusters.size > 0) {
    const sortedClusters = CLUSTER_ORDER.filter(c => strongClusters.has(c));
    // Bonus-Schaden je Cluster ableiten (für den Grund-Text)
    const clusterBonus = {};
    (BONUS_VS[name] || []).forEach(b => {
      (CLASS_TO_CLUSTERS[b.c] || []).forEach(cl => {
        if (clusterBonus[cl] === undefined || b.a > clusterBonus[cl]) clusterBonus[cl] = b.a;
      });
    });
    const bonusWord = currentLang === "de" ? "Bonusschaden" : "bonus damage";
    const genericReason = currentLang === "de" ? "Setzt dieser Linie stark zu" : "Strong against this line";
    html += `<div class="section-title mt"><span>🟢 ${ui('strong_vs_section')}</span></div>`;
    html += `<div class="counter-grid">`;
    for (const cluster of sortedClusters) {
      const rep = (CLUSTERS[cluster] || [])[0];
      const icon = rep ? getUnitIconHtml(rep, UNITS[rep]?.type || "", 28) : `<span class="counter-icon">⚔️</span>`;
      const reason = clusterBonus[cluster] !== undefined
        ? `+${clusterBonus[cluster]} ${bonusWord}`
        : genericReason;
      const click = rep ? ` onclick="selectUnit('${rep.replace(/'/g, "\\'")}')" style="cursor:pointer"` : "";
      html += `
        <div class="counter-row strong"${click}>
          ${icon}
          <div>
            <div class="counter-name">${cluster}</div>
            <div class="counter-reason">${reason}</div>
          </div>
          <span class="strength-badge strong">${ui('strong_badge')}</span>
        </div>`;
    }
    html += `</div>`;
  }

  // ── 4) Kurzprofil (ein Satz aus den Spieltexten) ──
  const desc = unitDesc(name);
  if (desc) {
    html += `<div class="section-title" style="margin-top:1.2rem">${ui('profile_section')}</div>`;
    html += `<div class="unit-blurb">${desc}</div>`;
  }

  // ── 5) Werte (HP, Angriff, Rüstungen …) + Bonus-Schaden + Kosten — als Zeilen-Liste ──
  if (s) {
    const fmt = (v) => (v === undefined || v === null) ? "—" : v;
    const isRanged = s.rng !== undefined;
    // Führendes Emoji aus vorhandenen UI-Labels entfernen (Icon steht in eigener Spalte)
    const stripIcon = (t) => t.replace(/^[^\p{L}\p{N}+]+/u, "");
    // Original-Spiel-Icon aus icons/stat/
    const si = (n) => `<img class="stat-icon" src="icons/stat/${n}.png" alt="" width="20" height="20">`;
    const row = (icon, label, val) =>
      `<div class="data-row"><span class="data-icon">${icon}</span><span class="data-label">${stripIcon(label)}</span><span class="data-val">${val}</span></div>`;

    // Kampfwerte
    html += `<div class="section-title mt"><span>${ui('stats_section')}</span></div>`;
    html += `<div class="data-grid">`;
    html += row(si('hp'), ui('stat_hp'), fmt(s.hp));
    // Nahkampf- vs. Distanzschaden trennen (Schadensart aus den Spieldaten; nie beides zugleich)
    const pierceAtk = PIERCE_ATTACKERS.has(name);
    const rl = (s.rl !== undefined && s.atk) ? `<span class="sub">/ ${s.rl}s</span>` : "";
    html += row(si('attack'), ui('stat_atk_melee'), pierceAtk ? "0" : `${fmt(s.atk)}${rl}`);
    html += row(si('pierce-attack'), ui('stat_atk_pierce'), pierceAtk ? `${fmt(s.atk)}${rl}` : "0");
    html += row(si('range'), ui('stat_rng'), isRanged ? `${fmt(s.rng)}${s.mrng !== undefined ? `<span class="sub">${ui('stat_min')} ${s.mrng}</span>` : ""}` : "0");
    html += row(si('melee-armor'), ui('stat_ma'), fmt(s.ma));
    html += row(si('pierce-armor'), ui('stat_pa'), fmt(s.pa));
    html += row(si('speed'), ui('stat_spd'), fmt(s.spd));
    if (s.acc !== undefined) html += row(si('attack'), ui('stat_acc'), `${s.acc}%`);
    // Bonus-Schaden vs. Klassen als eigene Zeilen (kein eigenes Bonus-Icon -> Attack-Icon)
    getDisplayableBonuses(name).forEach(b => {
      const rawLabel = CLASS_LABELS[b.c] || `${ui('class_word')} ${b.c}`;
      const label = tx('classLabels', rawLabel);
      html += row(si('bonus'), `Bonus ${ui('vs_word')} ${label}`, `<span class="data-bonus">+${b.a}</span>`);
    });
    html += `</div>`;

    // Kosten (ohne Ausbildungszeit, ohne Tempo — Tempo steht bei den Stats)
    if (s.cost) {
      const costIcons = { f: ["food", ui('cost_f')], w: ["wood", ui('cost_w')], g: ["gold", ui('cost_g')], s: ["stone", ui('cost_s')] };
      html += `<div class="section-title mt"><span>${ui('costs_section')}</span></div>`;
      html += `<div class="data-grid">`;
      ["f", "w", "g", "s"].forEach(k => {
        if (s.cost[k] !== undefined) html += row(si(costIcons[k][0]), costIcons[k][1], s.cost[k]);
      });
      html += `</div>`;
    }
  }

  // ── 6) Civ-Bonus (Boni, die diese Einheit unterstützen) — mit Original-Civ-Wappen ──
  const cbInfo = getCivBonuses(unit, name);
  if (cbInfo && cbInfo.list.length > 0) {
    html += `<div class="section-title" style="margin-top:1.2rem">${ui('civ_bonus_section')} · ${tx('civs', cbInfo.civ)}</div>`;
    html += `<div class="civ-bonus-box">`;
    html += civEmblemHtml(unit, 44);
    html += `<ul class="civ-bonus-list">`;
    cbInfo.list.forEach(b => { html += `<li>${b}</li>`; });
    html += `</ul>`;
    html += `</div>`;
  }

  // ── 7) Unique Technologies der Civ — mit Original-Tech-Icons ──
  const utInfo = getUniqueTechs(unit, name);
  if (utInfo && utInfo.list.length > 0) {
    const utLabel = currentLang === "de" ? "Einzigartige Technologien" : "Unique Technologies";
    html += `<div class="section-title" style="margin-top:1.2rem">🔬 ${utLabel} · ${tx('civs', utInfo.civ)}</div>`;
    html += `<div class="ut-grid">`;
    utInfo.list.forEach(t => {
      const ic = t.pic != null
        ? `<img class="ut-icon" src="icons/tech/${t.pic}.png" alt="${t.name}" width="40" height="40" loading="lazy">`
        : `<span class="ut-icon ut-icon-ph">🔬</span>`;
      html += `
        <div class="ut-row">
          ${ic}
          <div>
            <div class="ut-name">${t.name}</div>
            <div class="ut-desc">${t.desc}</div>
          </div>
        </div>`;
    });
    html += `</div>`;
  }

  // ── 8) Generische Einheit: welche Civs verstärken sie? (zugeklappt) ──
  const boosts = getCrossCivBoosts(unit, name);
  if (boosts) {
    const label = currentLang === "de"
      ? `${boosts.length} Zivilisationen verstärken diese Einheit`
      : `${boosts.length} civilizations boost this unit`;
    const boostTitle = currentLang === "de"
      ? "🏰 Civ-Boni & Unique Techs"
      : "🏰 Civ Bonuses & Unique Techs";
    html += `<div class="section-title mt"><span>${boostTitle}</span></div>`;
    html += `<details class="civ-boosts"><summary>${label}</summary><div class="civ-boost-list">`;
    boosts.forEach(b => {
      html += `<div class="civ-boost">
        <img class="civ-emblem" src="icons/civs/${b.emblem}" alt="" width="32" height="32" loading="lazy">
        <div>
          <div class="civ-boost-name">${tx('civs', b.civ)}</div>
          <ul class="civ-boost-lines">`;
      b.lines.forEach(l => {
        html += l.ut
          ? `<li><b>${l.name}</b> — ${l.text}</li>`
          : `<li>${l.text}</li>`;
      });
      html += `</ul></div></div>`;
    });
    html += `</div></details>`;
  }

  if (unit.counters.length === 0 && !s) {
    html = `<div class="no-data">${ui('no_data')}</div>`;
  }

  cardBody.innerHTML = html;
  resultEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

// ── Events ────────────────────────────────────────────────
searchInput.addEventListener("input", () => {
  const q = searchInput.value;
  renderSuggestions(getSuggestions(q));
});

searchInput.addEventListener("keydown", (e) => {
  const items = suggestionsEl.querySelectorAll(".suggestion-item");
  if (e.key === "ArrowDown") {
    e.preventDefault();
    activeIndex = Math.min(activeIndex + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle("active", i === activeIndex));
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    activeIndex = Math.max(activeIndex - 1, 0);
    items.forEach((el, i) => el.classList.toggle("active", i === activeIndex));
  } else if (e.key === "Enter") {
    if (activeIndex >= 0 && currentSuggestions[activeIndex]) {
      selectUnit(currentSuggestions[activeIndex]);
    } else if (currentSuggestions.length > 0) {
      selectUnit(currentSuggestions[0]);
    }
  } else if (e.key === "Escape") {
    suggestionsEl.classList.remove("open");
  }
});

document.addEventListener("click", (e) => {
  if (!e.target.closest(".search-wrap")) {
    suggestionsEl.classList.remove("open");
  }
});

// ── Language toggle ───────────────────────────────────────
function applyUI() {
  document.documentElement.lang = currentLang;
  document.title = ui('title');
  document.getElementById('page-h1').textContent = ui('h1');
  document.getElementById('page-tagline').textContent = ui('tagline');
  searchInput.placeholder = ui('search_placeholder');
  const tipText = document.getElementById('tip-text');
  if (tipText) tipText.textContent = ui('tip');
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === currentLang);
  });
}

function setLang(lang) {
  if (lang === currentLang) return;
  currentLang = lang;
  localStorage.setItem('aoe2lang', lang);
  applyUI();
  // Re-render current state
  if (searchInput.value) {
    renderSuggestions(getSuggestions(searchInput.value));
  }
  if (currentResultName && resultEl.classList.contains('visible')) {
    showResult(currentResultName);
  }
}

document.querySelectorAll('.lang-btn').forEach(b => {
  b.addEventListener('click', () => setLang(b.dataset.lang));
});

// ---- Theme toggle ----
const themeBtn = document.getElementById('theme-toggle');

function syncThemeIcon() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  themeBtn.textContent = dark ? '☀️' : '🌙';
  themeBtn.setAttribute('aria-label', dark ? 'Switch to light theme' : 'Switch to dark theme');
}

themeBtn.addEventListener('click', () => {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = dark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try { localStorage.setItem('aoe2-theme', next); } catch (e) {}
  syncThemeIcon();
});

syncThemeIcon();

applyUI();
</script>
