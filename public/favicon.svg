<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="21" fill="#18181b"/>
  <defs>
    <g id="sword" fill="#ffffff">
      <polygon points="50,12 53.5,58 46.5,58"/>            <!-- blade -->
      <rect x="35" y="57" width="30" height="5.5" rx="2.5"/> <!-- crossguard -->
      <rect x="46.5" y="62" width="7" height="15" rx="2"/>   <!-- grip -->
      <circle cx="50" cy="80.5" r="5"/>                      <!-- pommel -->
    </g>
  </defs>
  <use href="#sword" transform="rotate(30 50 80.5)"/>
  <use href="#sword" transform="rotate(-30 50 80.5)"/>
</svg>
